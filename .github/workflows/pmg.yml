name: Persistent Proxy E2E

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  persistent-proxy-e2e:
    name: Persistent Proxy E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout PMG at target commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: safedep/pmg
          ref: 63dfeb0ccc976e3849c58579dbd6f06bb06b26fd
          path: _pmg

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: _pmg/go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Build PMG
        run: make
        working-directory: _pmg

      - name: Add PMG to PATH
        run: echo "$GITHUB_WORKSPACE/_pmg/bin" >> "$GITHUB_PATH"

      - name: Configure PMG
        run: |
          echo
          {
            echo "PMG_CLOUD_ENABLED=true"
            echo "PMG_CLOUD_ENDPOINT_ID=github-actions/${{ github.repository }}"
          } >> "$GITHUB_ENV"

      - name: Setup PMG CA
        run: pmg setup cert install

      - name: Start proxy daemon
        run: pmg --debug proxy start --daemon

      - name: Inject proxy env
        run: pmg proxy env >> "$GITHUB_ENV"

      - name: Benign npm install succeeds
        run: |
          mkdir benign-test && cd benign-test
          npm init -y
          npm install lodash@4.17.21
          test -d node_modules/lodash
          cd .. && rm -rf benign-test

      - name: Malicious npm install is blocked
        continue-on-error: true
        run: |
          mkdir mal-npm && cd mal-npm
          npm init -y
          npm --no-cache --prefer-online install safedep-test-pkg@0.1.3
          cd .. && rm -rf mal-npm

      - name: Malicious pip install is blocked (python3 -m pip)
        continue-on-error: true
        run: |
          python3 -m venv venv && source venv/bin/activate
          python3 -m pip install safedep-test-pkg
          deactivate && rm -rf venv

      - name: Enforce PMG policy
        if: always()
        run: pmg --debug proxy stop --fail-on-violation

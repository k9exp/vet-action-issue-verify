name: Dependency Scanning  
  
on:  
  pull_request:  
    branches: [ main ]  
  push:  
    branches: [ main ]  
  
permissions:  
  contents: read  
  issues: write  
  pull-requests: write  
  
jobs:  
  scan:  
    runs-on: ubuntu-latest  
    steps:  
      - uses: actions/checkout@v4  
        
      - name: Scan Dependencies  
        uses: safedep/vet-action@98d70b08463d0828273f6b6c647d52c040586137
        with:
          cloud: true
          malware: true
          cloud-key: ${{ secrets.SAFEDEP_CLOUD_API_KEY }}
          cloud-tenant: ${{ secrets.SAFEDEP_CLOUD_TENANT }}
          policy-v2: '.github/v2.yml'
        env:  
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Dependency Scanning  
  
on:  
  pull_request:  
    branches: [ main ]  
  push:  
    branches: [ main ]  
  
permissions:  
  contents: read  
  issues: write  
  pull-requests: write  
  
jobs:  
  scan:  
    runs-on: ubuntu-latest  
    steps:  
      - uses: actions/checkout@v4  
        
      - name: Scan Dependencies  
        uses: safedep/vet-action@e2a78850eb517b8305b1085bca947bef29213a22
        with:
          cloud: false
          malware: true
          cloud-key: ${{ secrets.SAFEDEP_CLOUD_API_KEY }}
          cloud-tenant: ${{ secrets.SAFEDEP_CLOUD_TENANT }}
          policy-v2: '.github/v2.yml'
        env:  
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
